spring.application.name=appointment-scheduling-api

#spring.datasource.url=jdbc:postgresql://localhost:5161/appointment_scheduling?createDatabaseIfNotExist=true
#spring.datasource.username=postgres
#spring.datasource.password=Abdo@1152004


# الـ Port اللي Railway هيفتحه للمشروع
server.port=${PORT:8080}

# الربط بقاعدة البيانات - تأكد إن الأسماء دي هي اللي هتحطها في Variables على Railway
spring.datasource.url=${SPRING_DATABASE_URL}
spring.datasource.username=${SPRING_DATABASE_USER}
spring.datasource.password=${SPRING_DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Swagger Config
springdoc.swagger-ui.operations-sorter=method
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Custom Metadata
application.description=API for dynamically scheduling doctor appointments
application.version=1.0