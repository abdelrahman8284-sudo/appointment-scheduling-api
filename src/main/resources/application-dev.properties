spring.config.activate.on-profile=dev

spring.datasource.url=jdbc:postgresql://localhost:5161/appointment_scheduling?createDatabaseIfNotExist=true
spring.datasource.username=postgres
spring.datasource.password=${LOCAL_DB_PASSWORD}

server.port=8080

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


# JPA & Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql =true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update


spring.sql.init.mode=always
logging.level.org.springframework=debug


# Custom Metadata
application.description=API for dynamically scheduling doctor appointments
application.version=1.0